{% extends 'base.html' %}

{% block title %} Home {% endblock %}

{% block content %}


    <a href="{% url 'create' %}" class="btn btn-info">Create Todo</a><br>
    <div class="card">
        {% for todo in todos %}
            <a class="card-body" href="{% url 'detail' todo.id %}">{{ todo.title }}</a>
        {% endfor %}
    </div>

{% endblock %}
